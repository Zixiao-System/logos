name: Check & Build
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  checks:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            logos-lang/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('logos-lang/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check Rust
        working-directory: logos-lang
        run: cargo check --all-targets

  vscode-vendor:
    name: Build VS Code Vendor
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      VSCODE_REF: ${{ vars.VSCODE_REF || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22.21.1
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - name: Install VS Code build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev libx11-dev libxkbfile-dev pkg-config

      - name: Checkout VS Code
        uses: actions/checkout@v4
        with:
          repository: microsoft/vscode
          ref: ${{ env.VSCODE_REF }}
          path: vscode-src
          fetch-depth: 1

      - name: Sync VS Code vendor
        run: ./update.sh --source ./vscode-src --build

      - name: Upload VS Code vendor
        uses: actions/upload-artifact@v4
        with:
          name: vscode-vendor
          path: vendor/vscode

  build:
    name: Build & Package
    needs: [checks, rust-check, vscode-vendor]
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VS Code vendor
        uses: actions/download-artifact@v4
        with:
          name: vscode-vendor
          path: .

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            logos-lang/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('logos-lang/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Daemon
        working-directory: logos-lang
        run: cargo build --release --package logos-daemon

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build (vite + electron-builder)
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release/**
